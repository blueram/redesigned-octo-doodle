<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7ff" />
  <title>이동식 OX 게임</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section id="lobby" class="panel lobby">
      <div class="logo">OX</div>
      <h1>이동식 OX 게임</h1>
      <p>3개만 놓고, 4번째부터 기존 말을 이동하세요.</p>
      <button id="localBtn" class="primary">한 휴대폰에서 2인 플레이</button>
      <button id="installBtn" class="install hidden">이 휴대폰에 설치</button>
      <p class="guide">X와 O가 한 화면에서 번갈아 진행합니다.</p>
    </section>

    <section id="game" class="panel game hidden">
      <header>
        <div>
          <h1>이동식 OX 게임</h1>
          <p>한 휴대폰 2인 대전</p>
        </div>
        <button id="resetScoresBtn" class="icon-btn" title="점수 초기화">↻</button>
      </header>

      <section class="scoreboard">
        <div class="score x-score"><span>플레이어 X</span><b id="xScore">0</b><small>승</small></div>
        <div class="round-info"><span id="status">X 차례</span><small>번갈아 플레이</small></div>
        <div class="draw-score"><small>무승부</small><b id="drawScore">0</b></div>
        <div class="score o-score"><span>플레이어 O</span><b id="oScore">0</b><small>승</small></div>
      </section>

      <section id="board" class="board" aria-label="게임판"></section>
      <div class="guide" id="guide">빈칸을 선택하세요.</div>
      <button id="nextRoundBtn" class="primary hidden">다음 경기</button>
      <button id="homeBtn" class="secondary">처음 화면</button>

      <details>
        <summary>게임 규칙</summary>
        <p>각자 빈칸에 말을 3개까지 놓습니다. 이후에는 자신의 말을 선택한 다음 빈칸으로 이동합니다. 가로·세로·대각선으로 3개를 먼저 연결하면 승리합니다.</p>
      </details>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
